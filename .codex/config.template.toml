# Codex already discovers and processes ./AGENTS.md automatically for threads
# started in this workspace, so no extra config key is required here.

[mcp_servers."dev"]
command = "node"
args = ["SERVICENOW_MCP_SERVER_JS_PATH"]
startup_timeout_sec = 20
tool_timeout_sec = 60

[mcp_servers."dev".env]
SERVICENOW_INSTANCE_URL = "https://DEV_INSTANCE_NAME.service-now.com"
SERVICENOW_AUTH_METHOD = "basic"
SERVICENOW_BASIC_USERNAME = "USERNAME"
SERVICENOW_BASIC_PASSWORD = "PASSWORD"
MCP_TOOL_PACKAGE = "platform_developer"
WRITE_ENABLED = "true"
CMDB_WRITE_ENABLED = "false"
SCRIPTING_ENABLED = "true"

